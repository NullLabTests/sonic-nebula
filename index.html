<!DOCTYPE html>\n<html lang="en">\n<head>\n  <meta charset="UTF-8">\n  <meta name="viewport" content="width=device-width, initial-scale=1.0">\n  <title>Sonic Nebula - Generative Audio-Visual Experience</title>\n  <script>p5.disableFriendlyErrors = true;</script>\n  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>\n  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/addons/p5.sound.min.js"></script>\n  <style>\n    html, body { margin: 0; padding: 0; overflow: hidden; font-family: Arial, sans-serif; background: #000; color: #fff; }\n    canvas { display: block; }\n    #ui { position: absolute; top: 20px; left: 20px; z-index: 10; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px; }\n    #ui button { margin: 5px; padding: 5px 10px; background: #333; color: #fff; border: none; cursor: pointer; }\n    #ui button:hover { background: #555; }\n    #title { text-align: center; font-size: 24px; margin-bottom: 10px; }\n  </style>\n</head>\n<body>\n  <div id="ui">\n    <div id="title">Sonic Nebula</div>\n    <button onclick="toggleSound()">Toggle Sound</button>\n    <button onclick="toggleFullscreen()">Fullscreen</button>\n    <div>Sensitivity: <input type="range" id="sensitivity" min="0.5" max="3" step="0.1" value="1.5"></div>\n    <div>Particle Count: <input type="range" id="particleCount" min="500" max="2000" step="100" value="1000"></div>\n  </div>\n<script>\n// === Configuration ===\nlet CONFIG = {\n  particleCount: 1000,\n  nebulaSize: 500,\n  sensitivity: 1.5\n};\n\n// === Global State ===\nlet particles = [];\nlet fft;\nlet oscillator;\nlet env;\nlet soundPlaying = false;\n\n// === Particle Class ===\nclass Particle {\n  constructor() {\n    this.pos = p5.Vector.random3D().mult(random(CONFIG.nebulaSize / 2));\n    this.vel = createVector(0, 0, 0);\n    this.color = color(random(180, 240), 80, 90); // Blue-ish hues\n  }\n\n  update(bass, mid, treble) {\n    let force = createVector(\n      noise(this.pos.x * 0.01, this.pos.y * 0.01, this.pos.z * 0.01 + frameCount * 0.01) - 0.5,\n      noise(this.pos.y * 0.01, this.pos.z * 0.01, this.pos.x * 0.01 + frameCount * 0.01) - 0.5,\n      noise(this.pos.z * 0.01, this.pos.x * 0.01, this.pos.y * 0.01 + frameCount * 0.01) - 0.5\n    );\n    force.mult(bass * CONFIG.sensitivity * 0.05);\n    this.vel.add(force);\n    this.vel.mult(0.98); // damping\n    this.pos.add(this.vel);\n\n    // Color shift based on mid\n    let h = 180 + mid * 0.3;\n    this.color = color(h % 360, 80, 90 + treble * 0.2);\n\n    // Bound to sphere\n    if (this.pos.mag() > CONFIG.nebulaSize) {\n      this.pos.normalize().mult(CONFIG.nebulaSize);\n      this.vel.mult(-0.5);\n    }\n  }\n\n  display() {\n    stroke(this.color);\n    strokeWeight(2);\n    point(this.pos.x, this.pos.y, this.pos.z);\n  }\n}\n\n// === Setup ===\nfunction setup() {\n  createCanvas(windowWidth, windowHeight, WEBGL);\n  colorMode(HSB, 360, 100, 100);\n  noFill();\n\n  // Audio setup - generative sound\n  oscillator = new p5.Oscillator('sine');\n  oscillator.freq(220);\n  oscillator.amp(0);\n  env = new p5.Envelope(0.1, 0.5, 1, 0.5);\n\n  fft = new p5.FFT(0.8, 256);\n  fft.setInput(oscillator);\n\n  // Initialize particles\n  initParticles();\n\n  // UI event listeners\n  document.getElementById('sensitivity').addEventListener('input', (e) => {\n    CONFIG.sensitivity = parseFloat(e.target.value);\n  });\n  document.getElementById('particleCount').addEventListener('input', (e) => {\n    CONFIG.particleCount = parseInt(e.target.value);\n    initParticles();\n  });\n}\n\nfunction initParticles() {\n  particles = [];\n  for (let i = 0; i < CONFIG.particleCount; i++) {\n    particles.push(new Particle());\n  }\n}\n\n// === Draw Loop ===\nfunction draw() {\n  background(0, 0, 10); // Dark background\n\n  // Generate procedural sound\n  if (soundPlaying) {\n    let freq = map(sin(frameCount * 0.01), -1, 1, 110, 440);\n    oscillator.freq(freq);\n    env.play(oscillator);\n  }\n\n  // Get audio data\n  let spectrum = fft.analyze();\n  let bass = fft.getEnergy('bass') / 255;\n  let mid = fft.getEnergy('mid') / 255;\n  let treble = fft.getEnergy('treble') / 255;\n\n  // Update and display particles\n  rotateY(frameCount * 0.002);\n  rotateX(frameCount * 0.001);\n  for (let p of particles) {\n    p.update(bass, mid, treble);\n    p.display();\n  }\n\n  // Orbit camera\n  orbitControl();\n}\n\n// === UI Functions ===\nfunction toggleSound() {\n  if (soundPlaying) {\n    oscillator.stop();\n  } else {\n    oscillator.start();\n  }\n  soundPlaying = !soundPlaying;\n}\n\nfunction toggleFullscreen() {\n  let fs = fullscreen();\n  fullscreen(!fs);\n}\n\n// === Responsive ===\nfunction windowResized() {\n  resizeCanvas(windowWidth, windowHeight);\n}\n</script>\n</body>\n</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sonic Nebula - Generative Audio-Visual Experience</title>
  <script>p5.disableFriendlyErrors = true;</script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/addons/p5.sound.min.js"></script>
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; font-family: 'Arial', sans-serif; background: #000; color: #fff; }
    canvas { display: block; }
    #ui { position: absolute; top: 20px; left: 20px; z-index: 10; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,255,255,0.3); }
    #ui h1 { margin: 0 0 10px; font-size: 24px; text-shadow: 0 0 5px cyan; }
    #ui button { margin: 5px 0; padding: 8px 12px; background: linear-gradient(#333, #222); color: #fff; border: none; border-radius: 4px; cursor: pointer; transition: all 0.3s; }
    #ui button:hover { background: linear-gradient(#444, #333); box-shadow: 0 0 5px cyan; }
    #ui .slider { margin: 10px 0; }
    #ui label { display: block; margin-bottom: 5px; font-size: 14px; }
    #ui input[type="range"] { width: 200px; }
  </style>
</head>
<body>
  <div id="ui">
    <h1>Sonic Nebula</h1>
    <button onclick="toggleSound()">Toggle Sound</button>
    <button onclick="toggleFullscreen()">Fullscreen</button>
    <div class="slider">
      <label for="sensitivity">Sensitivity</label>
      <input type="range" id="sensitivity" min="0.5" max="3" step="0.1" value="1.5">
    </div>
    <div class="slider">
      <label for="particleCount">Particles</label>
      <input type="range" id="particleCount" min="500" max="3000" step="100" value="1000">
    </div>
    <div class="slider">
      <label for="baseFreq">Base Frequency</label>
      <input type="range" id="baseFreq" min="100" max="500" step="10" value="220">
    </div>
  </div>
<script>
// === Configuration ===
let CONFIG = {
  particleCount: 1000,
  nebulaSize: 600,
  sensitivity: 1.5,
  baseFreq: 220
};

// === Global State ===
let particles = [];
let fft;
let oscillators = [];
let noiseGen;
let soundPlaying = false;

// === Particle Class ===
class Particle {
  constructor() {
    this.pos = p5.Vector.random3D().mult(random(CONFIG.nebulaSize / 2));
    this.vel = createVector(0, 0, 0);
    this.color = color(random(180, 240), 80, 90); // Blue-ish hues
    this.size = random(1, 3);
  }

  update(bass, mid, treble) {
    let force = createVector(
      noise(this.pos.x * 0.005, this.pos.y * 0.005, this.pos.z * 0.005 + frameCount * 0.02) - 0.5,
      noise(this.pos.y * 0.005, this.pos.z * 0.005, this.pos.x * 0.005 + frameCount * 0.02) - 0.5,
      noise(this.pos.z * 0.005, this.pos.x * 0.005, this.pos.y * 0.005 + frameCount * 0.02) - 0.5
    );
    force.mult(bass * CONFIG.sensitivity * 0.1);
    this.vel.add(force);
    this.vel.mult(0.95); // stronger damping for smoother motion
    this.pos.add(this.vel);

    // Color shift with more variation
    let h = 180 + mid * 60 + sin(frameCount * 0.01) * 10;
    let s = 80 + treble * 20;
    let b = 90 + bass * 10;
    this.color = color(h % 360, constrain(s, 0, 100), constrain(b, 0, 100));

    // Bound to sphere with bounce
    if (this.pos.mag() > CONFIG.nebulaSize) {
      this.pos.normalize().mult(CONFIG.nebulaSize);
      this.vel.mult(-0.3);
    }
  }

  display() {
    stroke(this.color);
    strokeWeight(this.size);
    point(this.pos.x, this.pos.y, this.pos.z);
  }
}

// === Setup ===
function setup() {
  createCanvas(windowWidth, windowHeight, WEBGL);
  colorMode(HSB, 360, 100, 100);
  noFill();
  strokeCap(ROUND);

  // Audio setup - generative sound with multiple layers
  fft = new p5.FFT(0.8, 512);

  // Create multiple oscillators for rich sound
  for (let i = 0; i < 3; i++) {
    let osc = new p5.Oscillator('sine');
    osc.freq(CONFIG.baseFreq * (1 + i * 0.5));
    osc.amp(0);
    oscillators.push(osc);
    fft.setInput(osc);
  }

  // Add noise for ambient texture
  noiseGen = new p5.Noise('white');
  noiseGen.amp(0);
  fft.setInput(noiseGen);

  initParticles();

  // UI event listeners
  document.getElementById('sensitivity').addEventListener('input', (e) => {
    CONFIG.sensitivity = parseFloat(e.target.value);
  });
  document.getElementById('particleCount').addEventListener('input', (e) => {
    CONFIG.particleCount = parseInt(e.target.value);
    initParticles();
  });
  document.getElementById('baseFreq').addEventListener('input', (e) => {
    CONFIG.baseFreq = parseInt(e.target.value);
    updateFrequencies();
  });
}

function initParticles() {
  particles = [];
  for (let i = 0; i < CONFIG.particleCount; i++) {
    particles.push(new Particle());
  }
}

function updateFrequencies() {
  oscillators.forEach((osc, i) => {
    osc.freq(CONFIG.baseFreq * (1 + i * 0.5));
  });
}

// === Draw Loop ===
function draw() {
  background(0, 0, 5); // Deeper dark background with slight alpha for trails

  // Modulate sound if playing
  if (soundPlaying) {
    let time = frameCount * 0.005;
    oscillators.forEach((osc, i) => {
      let modFreq = CONFIG.baseFreq * (1 + i * 0.5) + sin(time + i) * 20;
      osc.freq(modFreq);
      osc.amp(0.3 + sin(time * 0.5 + i) * 0.1, 0.1);
    });
    noiseGen.amp(0.1 + sin(time * 0.2) * 0.05, 0.1);
  }

  // Get audio data
  let spectrum = fft.analyze();
  let bass = fft.getEnergy(20, 140) / 255;
  let mid = fft.getEnergy(140, 400) / 255;
  let treble = fft.getEnergy(400, 6000) / 255;

  // Update and display particles
  rotateY(frameCount * 0.001);
  rotateX(frameCount * 0.0005);
  rotateZ(frameCount * 0.0002);
  for (let p of particles) {
    p.update(bass, mid, treble);
    p.display();
  }

  // Add glow effect
  drawingContext.globalCompositeOperation = 'screen';

  // Orbit control for interaction
  orbitControl(1, 1, 0.1);
}

// === UI Functions ===
function toggleSound() {
  if (soundPlaying) {
    oscillators.forEach(osc => osc.stop());
    noiseGen.stop();
  } else {
    oscillators.forEach(osc => osc.start());
    noiseGen.start();
    userStartAudio(); // Ensure audio context is running
  }
  soundPlaying = !soundPlaying;
}

function toggleFullscreen() {
  let fs = fullscreen();
  fullscreen(!fs);
}

// === Responsive ===
function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
